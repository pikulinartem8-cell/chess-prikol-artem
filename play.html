<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Королевская Дуэль — Выбор режима</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  
  <style>
    .highlight-move { box-shadow: inset 0 0 3px 3px rgba(217, 185, 106, 0.7); }
    .highlight-selected { background-color: rgba(111, 71, 199, 0.5) !important; }

    #promotion-modal {
      display: none; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%); background: var(--panel);
      padding: 25px; border: 2px solid var(--accent); border-radius: 15px;
      z-index: 1000; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.9);
    }
    .promo-choice { display: flex; gap: 15px; margin-top: 15px; justify-content: center; }
    .promo-btn {
      background: var(--panel-light); border: 1px solid var(--line);
      padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s;
    }
    .promo-btn:hover { background: var(--accent); }
    .promo-btn img { width: 50px; height: 50px; }

    #board { width: 550px; max-width: 90vw; margin: 0 auto; }

    /* Стили для кнопок режимов */
    .mode-selector { display: flex; gap: 10px; margin-bottom: 20px; }
    .mode-btn {
      flex: 1; padding: 10px; background: var(--panel-light);
      border: 1px solid var(--line); color: var(--text);
      border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: 0.3s;
    }
    .mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(217, 185, 106, 0.1); }
    .mode-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
</head>
<body>

<div id="promotion-modal">
  <h3 style="color: var(--text);">Выберите фигуру</h3>
  <div class="promo-choice">
    <div class="promo-btn" onclick="selectPromotion('q')"><img src="https://chessboardjs.com/img/chesspieces/wikipedia/wQ.png"></div>
    <div class="promo-btn" onclick="selectPromotion('r')"><img src="https://chessboardjs.com/img/chesspieces/wikipedia/wR.png"></div>
    <div class="promo-btn" onclick="selectPromotion('b')"><img src="https://chessboardjs.com/img/chesspieces/wikipedia/wB.png"></div>
    <div class="promo-btn" onclick="selectPromotion('n')"><img src="https://chessboardjs.com/img/chesspieces/wikipedia/wN.png"></div>
  </div>
</div>

<header class="container">
  <div class="logo">CHESS DUEL</div>
  <nav><a href="index.html">Выход</a></nav>
</header>

<main class="container" style="display: flex; gap: 40px; justify-content: center; align-items: flex-start; padding: 20px 0;">
  
  <div style="flex-shrink: 0;">
    <div id="t-black" class="timer" style="margin-bottom: 15px;">03:00</div>
    <div id="board"></div>
    <div id="t-white" class="timer active" style="margin-top: 15px;">03:00</div>
  </div>

  <div class="card" style="width: 320px; text-align: center; position: sticky; top: 20px;">
    <img src="king.png" alt="King" style="width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 20px;">
    
    <div id="status" style="font-weight: bold; color: var(--accent); margin-bottom: 15px;">Выберите режим</div>

    <div class="mode-selector">
      <button id="btn-blitz" class="mode-btn active" onclick="setMode('blitz')">Блиц<br>3+2</button>
      <button id="btn-bullet" class="mode-btn" onclick="setMode('bullet')">Пуля<br>1+0</button>
    </div>

    <button class="btn" style="width: 100%; margin-bottom: 10px;" onclick="location.reload()">Сброс</button>
    <button class="btn" style="width: 100%; background: var(--royal);" onclick="board.flip()">Развернуть</button>
  </div>
</main>

<script>
  var board = null, game = new Chess();
  var selectedSquare = null, pendingMove = null;
  var wTime = 180, bTime = 180, increment = 2, timer = null;
  var gameStarted = false;

  function setMode(mode) {
    if (gameStarted) return;
    
    $('.mode-btn').removeClass('active');
    if (mode === 'blitz') {
      wTime = 180; bTime = 180; increment = 2;
      $('#btn-blitz').addClass('active');
    } else {
      wTime = 60; bTime = 60; increment = 0;
      $('#btn-bullet').addClass('active');
    }
    renderT('t-white', wTime);
    renderT('t-black', bTime);
  }

  function removeHighlights() { $('#board .square-55d63').removeClass('highlight-move highlight-selected'); }
  function highlightSquare(square) { $('#board .square-' + square).addClass('highlight-selected'); }
  function highlightMoves(moves) { moves.forEach(m => $('#board .square-' + m.to).addClass('highlight-move')); }

  function onSquareClick(square) {
    var piece = game.get(square);
    if (piece && piece.color === game.turn()) {
      removeHighlights();
      selectedSquare = square;
      highlightSquare(square);
      highlightMoves(game.moves({ square: square, verbose: true }));
      return;
    }

    if (selectedSquare) {
      var moves = game.moves({ square: selectedSquare, verbose: true });
      var isPromotion = moves.some(m => m.to === square && m.flags.includes('p'));
      if (isPromotion) {
        pendingMove = { from: selectedSquare, to: square };
        $('#promotion-modal').show();
        return;
      }
      executeMove({ from: selectedSquare, to: square, promotion: 'q' });
    }
  }

  function selectPromotion(pieceType) {
    $('#promotion-modal').hide();
    if (pendingMove) {
      pendingMove.promotion = pieceType;
      executeMove(pendingMove);
      pendingMove = null;
    }
  }

  function executeMove(moveData) {
    var move = game.move(moveData);
    if (move === null) {
      removeHighlights();
      selectedSquare = null;
      return;
    }

    // Блокируем смену режима после первого хода
    if (!gameStarted) {
      gameStarted = true;
      $('.mode-btn').prop('disabled', true);
    }

    // Логика инкремента
    if (game.turn() === 'b') { wTime += increment; } else { bTime += increment; }

    renderT('t-white', wTime); renderT('t-black', bTime);
    board.position(game.fen());
    removeHighlights();
    selectedSquare = null;

    if (!timer) timer = setInterval(tick, 1000);
    
    $('.timer').removeClass('active');
    $(game.turn() === 'w' ? '#t-white' : '#t-black').addClass('active');
    updateStatus();
  }

  function updateStatus() {
    var status = game.turn() === 'w' ? 'Ход белых' : 'Ход черных';
    if (game.in_checkmate()) { status = 'МАТ!'; clearInterval(timer); }
    else if (game.in_draw()) { status = 'НИЧЬЯ!'; clearInterval(timer); }
    $('#status').text(status);
  }

  function tick() {
    if (game.turn() === 'w') wTime--; else bTime--;
    renderT('t-white', wTime); renderT('t-black', bTime);
    if (wTime <= 0 || bTime <= 0) {
      clearInterval(timer);
      alert('Время вышло! Победа ' + (wTime <= 0 ? 'черных' : 'белых'));
    }
  }

  function renderT(id, seconds) {
    if (seconds < 0) seconds = 0;
    var m = Math.floor(seconds / 60), s = seconds % 60;
    document.getElementById(id).innerText = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }

  board = ChessBoard('board', {
    position: 'start', draggable: false,
    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
  });

  $('#board').on('click', '.square-55d63', function() {
    onSquareClick($(this).data('square'));
  });
</script>
</body>
</html>
