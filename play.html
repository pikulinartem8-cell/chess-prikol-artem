<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Шахматная Дуэль — Pro Mode</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <style>
    .game-layout { display: grid; grid-template-columns: 1fr auto 1fr; gap: 40px; align-items: center; padding-top: 20px; }
    
    #board { width: 550px; border: 8px solid var(--line); border-radius: 12px; box-shadow: 0 0 60px rgba(0,0,0,0.7); }
    
    .side-panel { display: flex; flex-direction: column; gap: 20px; align-items: center; }
    
    .timer {
      font-size: 3.5rem; font-family: 'Courier New', monospace;
      background: #000; color: #555; padding: 15px 30px;
      border-radius: 15px; border: 2px solid var(--line);
      min-width: 220px; text-align: center; transition: 0.3s;
    }
    .timer.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 20px rgba(217,185,106,0.3); }

    .controls-card { background: var(--panel); border: 1px solid var(--line); padding: 25px; border-radius: 20px; width: 100%; }
    
    .checkbox-container { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 1.1rem; color: var(--muted); }
    .checkbox-container input { width: 20px; height: 20px; cursor: pointer; accent-color: var(--accent); }

    .win-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
    
    @media (max-width: 1100px) {
      .game-layout { grid-template-columns: 1fr; justify-items: center; }
      .side-panel { flex-direction: row; width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <header class="container">
    <div class="logo">ULTIMATE DUEL</div>
    <nav><a href="index.html">Выход</a></nav>
  </header>

  <main class="container">
    <div class="game-layout">
      <div class="side-panel">
        <div id="t-black" class="timer">03:00</div>
        <p style="color: var(--muted)">Черные (Оппонент)</p>
      </div>

      <div style="text-align: center;">
        <img src="Gemini_Generated_Image_s8rq1us8rq1us8rq.jpg" alt="King" style="width: 80px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 15px;">
        <div id="board"></div>
      </div>

      <div class="side-panel">
        <div id="t-white" class="timer active">03:00</div>
        
        <div class="controls-card">
          <label class="checkbox-container">
            <input type="checkbox" id="autoFlip" checked>
            <span>Авто-поворот доски</span>
          </label>
          <hr style="border: 0; border-top: 1px solid var(--line); margin: 20px 0;">
          <button class="btn" id="flipBtn" style="width: 100%; margin-bottom: 10px;">🔄 Развернуть</button>
          <button class="btn" style="width: 100%; background: #444;" onclick="location.reload()">🏳 Сдаться</button>
        </div>
      </div>
    </div>
  </main>

  <div id="winScreen" class="win-screen">
    <div style="background: var(--panel-light); padding: 60px; border-radius: 40px; border: 3px solid var(--accent); text-align: center;">
      <h1 id="winMessage" style="font-size: 4rem; color: var(--accent);">МАТ</h1>
      <p id="winSub" style="font-size: 1.8rem; margin-bottom: 30px;">Белые победили!</p>
      <button class="btn" onclick="location.reload()">Играть еще раз</button>
    </div>
  </div>

  <script>
    var board = null;
    var game = new Chess();
    var whiteTime = 180, blackTime = 180;
    var timerInterval = null;

    function onDragStart (source, piece, position, orientation) {
      if (game.game_over()) return false;
      if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
          (game.turn() === 'b' && piece.search(/^w/) !== -1)) return false;
    }

    function onDrop (source, target) {
      var move = game.move({ from: source, to: target, promotion: 'q' });
      if (move === null) return 'snapback';

      // Запуск таймера при первом ходе
      if (!timerInterval) timerInterval = setInterval(updateClocks, 1000);
      
      handleMoveEffect();
    }

    function handleMoveEffect() {
      // Подсветка активного таймера
      $('.timer').removeClass('active');
      if (game.turn() === 'w') $('#t-white').addClass('active');
      else $('#t-black').addClass('active');

      // Авто-поворот, если галочка стоит
      if ($('#autoFlip').is(':checked')) {
        board.orientation(game.turn() === 'w' ? 'white' : 'black');
      }

      checkGameOver();
    }

    function updateClocks() {
      if (game.turn() === 'w') whiteTime--; else blackTime--;
      
      renderTime('t-white', whiteTime);
      renderTime('t-black', blackTime);

      if (whiteTime <= 0 || blackTime <= 0) {
        clearInterval(timerInterval);
        showWin('ВРЕМЯ ВЫШЛО', whiteTime <= 0 ? 'Черные победили' : 'Белые победили');
      }
    }

    function renderTime(id, t) {
      let m = Math.floor(t / 60), s = t % 60;
      document.getElementById(id).innerText = `${m}:${s < 10 ? '0' + s : s}`;
    }

    function checkGameOver() {
      if (game.in_checkmate()) {
        showWin('МАТ!', game.turn() === 'w' ? 'Черные победили' : 'Белые победили');
      } else if (game.in_draw()) {
        showWin('НИЧЬЯ', 'Пат или повторение позиции');
      }
    }

    function showWin(title, sub) {
      clearInterval(timerInterval);
      $('#winMessage').text(title);
      $('#winSub').text(sub);
      $('#winScreen').css('display', 'flex');
    }

    board = ChessBoard('board', {
      draggable: true,
      position: 'start',
      onDragStart: onDragStart,
      onDrop: onDrop,
      onSnapEnd: () => board.position(game.fen()),
      pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    });

    $('#flipBtn').on('click', board.flip);
  </script>
</body>
</html>
